<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NERDS.CO | Bootstrap Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black text-white">

    <nav class="navbar navbar-expand-lg navbar-dark border-bottom border-secondary p-3">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">NERDS.CO</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="#">Training</a>
                <a class="nav-link" href="#">Culture</a>
            </div>
        </div>
    </nav>

    <header class="container-fluid p-0 position-relative">
        <img src="https://picsum.photos/id/122/1920/1080" class="img-fluid w-100 vh-75 object-fit-cover grayscale-filter" alt="Hero">
        <div class="position-absolute top-50 start-0 translate-middle-y ps-5">
            <h1 class="display-1 fw-black text-uppercase">Heavy Duty<br><span class="text-outline">Mentality</span></h1>
        </div>
    </header>

    <main class="container py-5">
        <div class="row g-4">
            <div class="col-md-6">
                <div class="card bg-dark text-white border-0">
                    <img src="https://picsum.photos/id/61/600/800" class="card-img-top grayscale-filter" alt="Training">
                    <div class="card-body">
                        <h3 class="card-title">The Dorian Yates Era</h3>
                        <p class="card-text text-secondary">O legado do treinamento de alta intensidade.</p>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card bg-dark text-white border-0">
                    <img src="https://picsum.photos/id/334/600/800" class="card-img-top grayscale-filter" alt="Music">
                    <div class="card-body">
                        <h3 class="card-title">Industrial Techno</h3>
                        <p class="card-text text-secondary">A conexão entre graves e falha muscular.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-darker py-5 border-top border-secondary">
        <div class="container text-center">
            <h2 class="mb-4">JOIN THE NETWORK</h2>
            <form class="row g-2 justify-content-center">
                <div class="col-auto">
                    <input type="text" class="form-control bg-transparent text-white" placeholder="NAME">
                </div>
                <div class="col-auto">
                    <input type="email" class="form-control bg-transparent text-white" placeholder="EMAIL">
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-light fw-bold">SUBSCRIBE</button>
                </div>
            </form>
            <p class="mt-5 small text-secondary">&copy; 2026 NERDS.CO</p>
        </div>
    </footer>

</body>
</html>
